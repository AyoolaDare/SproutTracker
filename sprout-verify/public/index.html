<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify Sprout Track receipts and invoices by ID or QR code.">
  <title>Sprout Verify - Receipt & Invoice Verification</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body data-page="home">
  <main class="container">
    <section class="logo" aria-label="Sprout Track">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="32" r="30" fill="#2a3024" stroke="#7a8f5c" stroke-width="2"/>
        <path d="M32 44V28" stroke="#7a8f5c" stroke-width="3" stroke-linecap="round"/>
        <path d="M32 28C32 28 24 24 24 18C24 12 32 14 32 14C32 14 40 12 40 18C40 24 32 28 32 28Z" fill="#7a8f5c"/>
        <path d="M32 44C32 44 22 40 22 32" stroke="#7a8f5c" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M32 44C32 44 42 40 42 32" stroke="#7a8f5c" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="32" cy="48" r="2" fill="#d4a85a"/>
      </svg>
      <div class="logo-text">Sprout Verify</div>
      <div class="logo-sub">Receipt & Invoice Verification</div>
    </section>

    <section class="card">
      <h1>Verify a record</h1>
      <p>Scan the QR code on a receipt or invoice, or type the document ID.</p>

      <form class="search-form" data-verify-form>
        <input
          type="text"
          class="input-field"
          data-receipt-input
          placeholder="RCP-2026-06-21-7A3F9E2D"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
          required
          maxlength="96"
        >
        <button type="submit" class="btn btn-primary">Verify ID</button>
      </form>

      <div class="scan-divider"><span>or</span></div>

      <button type="button" class="btn btn-secondary" data-scan-start>Scan QR code</button>
      <div class="scanner" data-scanner hidden>
        <video data-scan-video playsinline muted></video>
        <div class="scanner-frame" aria-hidden="true"></div>
        <p class="scanner-status" data-scan-status>Point your camera at the QR code.</p>
        <button type="button" class="btn btn-secondary" data-scan-stop>Stop camera</button>
      </div>
    </section>

    <section class="trust-strip" aria-label="Security promises">
      <span>Read-only</span>
      <span>ECDSA signed</span>
      <span>No login</span>
    </section>

    <footer class="footer">
      Public verification for Sprout Track records &middot; <a href="/api/health">API Status</a>
    </footer>
  </main>
</body>
</html>
